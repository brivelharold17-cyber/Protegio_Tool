{% extends 'dashboard/base.html' %}

{% block title %}{{ filename }} - PROTEGIO{% endblock %}

{% block content %}
<div class="main-content" style="padding: 0;">
    <header class="page-header" style="background: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 20px;">
        <div class="header-content">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div>
                    <h1><i class="fas fa-file-pdf"></i> {{ filename }}</h1>
                </div>
                <div style="display: flex; gap: 10px;">
                    <a href="{% url 'reports:download' filename %}" class="btn-header">
                        <i class="fas fa-download"></i> Download
                    </a>
                    <a href="{% url 'reports:list' %}" class="btn-header">
                        <i class="fas fa-arrow-left"></i> Back
                    </a>
                </div>
            </div>
        </div>
    </header>

    <div class="report-viewer">
        <iframe id="report-frame" style="width: 100%; min-height: calc(100vh - 150px); border: none;"></iframe>
    </div>
</div>

<style>
    .btn-header {
        padding: 8px 16px;
        background: var(--primary);
        color: #000;
        border: 1px solid var(--primary);
        border-radius: 6px;
        cursor: pointer;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .btn-header:hover {
        background: rgba(88, 166, 255, 0.2);
        color: var(--primary);
        border-color: var(--primary);
    }

    .page-header {
        margin: 0 !important;
    }

    .report-viewer {
        background: white;
        padding: 0;
        margin: 0;
    }

    #report-frame {
        margin: 0;
        padding: 0;
    }
</style>

<script>
    // Load report HTML in iframe
    document.addEventListener('DOMContentLoaded', function() {
        const content = `{{ content|escapejs }}`;
        const iframe = document.getElementById('report-frame');
        iframe.srcdoc = content;
    });
</script>
{% endblock %}
