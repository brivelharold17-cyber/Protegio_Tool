<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PROTEGIO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #58a6ff;
            --dark: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --border-color: #30363d;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --border: #30363d;
        }

        body {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signup-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .signup-card {
            background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .signup-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .signup-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .signup-header p {
            font-size: 14px;
            color: #8b949e;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-control {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .form-control:focus {
            background-color: #0d1117;
            border-color: var(--primary);
            color: var(--text-main);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
            outline: none;
        }

        .form-control::placeholder {
            color: #6e7681;
        }

        .btn-signup {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, var(--primary), #79c0ff);
            border: none;
            color: #000;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(88, 166, 255, 0.3);
        }

        .btn-signup:active {
            transform: translateY(0);
        }

        .signup-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .signup-footer a {
            color: var(--primary);
            text-decoration: none;
        }

        .signup-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            border-radius: 6px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            background-color: rgba(248, 81, 73, 0.1);
            color: #f85149;
            padding: 12px 16px;
            font-size: 14px;
        }

        .alert-success {
            background-color: rgba(63, 185, 80, 0.1);
            color: #3fb950;
            border-color: var(--border-color);
        }

        .password-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <div class="signup-header">
                <h1><i class="fas fa-user-plus"></i> Create Account</h1>
                <p>Join the PROTEGIO platform</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label class="form-label" for="username">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input 
                        type="text" 
                        id="username"
                        name="username" 
                        class="form-control" 
                        placeholder="Choose a username"
                        required
                        autofocus
                    >
                    <div class="password-hint">Letters, numbers, and underscores only</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input 
                        type="email" 
                        id="email"
                        name="email" 
                        class="form-control" 
                        placeholder="your.email@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input 
                        type="password" 
                        id="password"
                        name="password" 
                        class="form-control" 
                        placeholder="Create a strong password"
                        required
                    >
                    <div class="password-hint">At least 8 characters recommended</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password_confirm">
                        <i class="fas fa-check-circle"></i> Confirm Password
                    </label>
                    <input 
                        type="password" 
                        id="password_confirm"
                        name="password_confirm" 
                        class="form-control" 
                        placeholder="Re-enter your password"
                        required
                    >
                </div>

                <button type="submit" class="btn-signup">
                    <i class="fas fa-user-check"></i> Create Account
                </button>
            </form>

            <div class="signup-footer">
                Already have an account? <a href="{% url 'accounts:login' %}">Sign in here</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
